<div class="assets-page">
  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <app-assets-toolbar
    [params]="filterParams()"
    [availableStates]="availableStates()"
    [availableTypes]="availableTypes()"
    [totalCount]="listState().status === 'loaded' ? totalCount() : null"
    (searchChange)="onSearchInput($event)"
    (stateFilterChange)="onStateFilter($event)"
    (typeFilterChange)="onTypeFilter($event)"
    (filtersReset)="resetFilters()"
    (newClick)="openCreateDrawer()"
  />

  <!-- ── Table + selection bar + pagination ─────────────────────────────── -->
  <app-assets-table
    [listState]="listState()"
    [availableStates]="availableStates()"
    [sortField]="sortField()"
    [sortDir]="sortDir()"
    [selectedIds]="selectedIds()"
    [selectAllPages]="selectAllPages()"
    [isAllSelected]="isAllSelected()"
    [isSomeSelected]="isSomeSelected()"
    [canSelectAllPages]="canSelectAllPages()"
    [selectedCount]="selectedCount()"
    [totalCount]="totalCount()"
    [bulkEditState]="bulkEditState()"
    [expandedId]="expandedId()"
    [totalPages]="totalPages()"
    [startIndex]="startIndex()"
    [endIndex]="endIndex()"
    [currentPage]="params().page"
    [deleteConfirmId]="deleteConfirmId()"
    [deleteSaveState]="deleteSaveState()"
    [today]="today"
    (sortChange)="sortBy($event)"
    (expandToggle)="toggleExpand($event)"
    (selectAllToggle)="toggleSelectAll()"
    (selectRowToggle)="toggleSelectRow($event)"
    (selectionCleared)="clearSelection()"
    (allPagesSelected)="selectAcrossAllPages()"
    (statePickerOpen)="onStatePickerOpen($event)"
    (editRequested)="openEditDrawer($event)"
    (deleteRequested)="requestDelete($event)"
    (deleteConfirmed)="confirmDelete($event)"
    (deleteCancelled)="cancelDelete()"
    (bulkPickerOpen)="onBulkPickerOpen($event)"
    (pageChange)="goToPage($event)"
    (exportRequested)="exportToExcel(true)"
    (retryLoad)="resetFilters()"
  />
</div>

<!-- ── State picker overlay ────────────────────────────────────────────────── -->
@if (statePickerAssetId() !== null) {
  <app-asset-state-picker
    [states]="availableStates()"
    [x]="statePickerX()"
    [y]="statePickerY()"
    [editState]="stateEditState()"
    (picked)="pickState($event)"
    (closed)="closeStatePicker()"
  />
}

<!-- ── Create asset drawer ──────────────────────────────────────────────────── -->
@if (createDrawerOpen()) {
  <app-asset-create-drawer
    [availableStates]="availableStates()"
    [availableModels]="availableModels()"
    (saved)="onDrawerSaved()"
    (cancelled)="closeCreateDrawer()"
  />
}

<!-- ── Edit asset drawer ────────────────────────────────────────────────────── -->
@if (editingAsset() !== null) {
  <app-asset-create-drawer
    mode="edit"
    [editAsset]="editingAsset()"
    [availableStates]="availableStates()"
    [availableModels]="availableModels()"
    (saved)="onEditSaved()"
    (cancelled)="closeEditDrawer()"
  />
}

<!-- ── Bulk state picker overlay ────────────────────────────────────────────── -->
@if (bulkPickerOpen()) {
  <app-asset-state-picker
    [states]="availableStates()"
    [x]="bulkPickerX()"
    [y]="bulkPickerY()"
    [editState]="bulkEditState()"
    [bulkCount]="selectedCount()"
    (picked)="bulkPickState($event)"
    (closed)="closeBulkPicker()"
  />
}
