<div class="racks-page">
  <!-- ─── Toolbar ────────────────────────────────────────── -->
  <app-racks-toolbar />

  <!-- ─── Table ─────────────────────────────────────────── -->
  <div class="table-wrap">
    <app-racks-table />
  </div>
</div>

<!-- ─── Drawer ──────────────────────────────────────────── -->
@if (store.drawerMode() !== null) {
  <app-rack-create-drawer
    [mode]="store.drawerMode()!"
    [rack]="store.editingRack()"
    (saved)="store.onDrawerSaved($event)"
    (cancelled)="store.onDrawerClose()"
  />
}
