<div class="racks-page">
  <!-- ─── Toolbar ────────────────────────────────────────── -->
  <app-racks-toolbar />

  <!-- ─── Table ─────────────────────────────────────────── -->
  <div class="table-wrap">
    <app-racks-table />
  </div>
</div>

<!-- ─── Rack drawer ──────────────────────────────────── -->
@if (store.drawerMode() !== null) {
  <app-rack-create-drawer
    [mode]="store.drawerMode()!"
    [rack]="store.editingRack()"
    [latestRackType]="store.latestRackType()"
    (saved)="store.onDrawerSaved($event)"
    (cancelled)="store.onDrawerClose()"
  />
}

<!-- ─── Rack model drawer ───────────────────────────── -->
@if (store.rackModelDrawerOpen()) {
  <app-rack-model-create-drawer
    (saved)="store.onModelDrawerSaved($event)"
    (cancelled)="store.onModelDrawerClose()"
  />
}
