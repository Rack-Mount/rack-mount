<div class="drawer-backdrop" (click)="cancelled.emit()"></div>

<div class="create-drawer">
  <!-- Header -->
  <div class="drawer-header">
    <h3>{{ "rack_models.drawer_create_title" | translate }}</h3>
    <button
      class="drawer-close"
      type="button"
      (click)="cancelled.emit()"
      [title]="'common.close' | translate"
    >
      <svg viewBox="0 0 16 16" fill="none">
        <path
          d="M12 4L4 12M4 4l8 8"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="drawer-body">
    <!-- Model name -->
    <div class="form-group">
      <label for="rm-model">
        {{ "rack_models.field_model" | translate }}
        <span class="required">*</span>
      </label>
      <input
        id="rm-model"
        class="form-input"
        type="text"
        autocomplete="off"
        [placeholder]="'rack_models.field_model' | translate"
        [value]="form().model"
        (input)="onFieldChange('model', $any($event.target).value)"
      />
    </div>

    <!-- Capacity -->
    <div class="form-group">
      <label for="rm-capacity">
        {{ "rack_models.field_capacity" | translate }}
        <span class="required">*</span>
      </label>
      <div class="input-with-unit">
        <input
          id="rm-capacity"
          class="form-input"
          type="number"
          min="1"
          [placeholder]="'rack_models.field_capacity' | translate"
          [value]="form().capacity ?? ''"
          (input)="
            onFieldChange(
              'capacity',
              $any($event.target).value ? +$any($event.target).value : null
            )
          "
        />
        <span class="unit-label">U</span>
      </div>
    </div>

    <!-- Width -->
    <div class="form-group">
      <label for="rm-width">
        {{ "rack_models.field_width" | translate }}
        <span class="required">*</span>
      </label>
      <div class="input-with-unit">
        <input
          id="rm-width"
          class="form-input"
          type="number"
          min="1"
          [placeholder]="'rack_models.field_width' | translate"
          [value]="form().width ?? ''"
          (input)="
            onFieldChange(
              'width',
              $any($event.target).value ? +$any($event.target).value : null
            )
          "
        />
        <span class="unit-label">mm</span>
      </div>
    </div>

    <!-- Depth -->
    <div class="form-group">
      <label for="rm-depth">
        {{ "rack_models.field_depth" | translate }}
        <span class="required">*</span>
      </label>
      <div class="input-with-unit">
        <input
          id="rm-depth"
          class="form-input"
          type="number"
          min="1"
          [placeholder]="'rack_models.field_depth' | translate"
          [value]="form().depth ?? ''"
          (input)="
            onFieldChange(
              'depth',
              $any($event.target).value ? +$any($event.target).value : null
            )
          "
        />
        <span class="unit-label">mm</span>
      </div>
    </div>

    <!-- Height (optional) -->
    <div class="form-group">
      <label for="rm-height">
        {{ "rack_models.field_height" | translate }}
      </label>
      <div class="input-with-unit">
        <input
          id="rm-height"
          class="form-input"
          type="number"
          min="1"
          [placeholder]="'rack_models.field_height_placeholder' | translate"
          [value]="form().height ?? ''"
          (input)="
            onFieldChange(
              'height',
              $any($event.target).value ? +$any($event.target).value : null
            )
          "
        />
        <span class="unit-label">cm</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="drawer-footer">
    @if (saveState() === "error") {
      <p class="save-error">{{ saveMsg() | translate }}</p>
    }

    <div class="footer-actions">
      <button
        class="btn-cancel"
        type="button"
        [disabled]="saveState() === 'saving'"
        (click)="cancelled.emit()"
      >
        {{ "common.cancel" | translate }}
      </button>

      <button
        class="btn-save"
        type="button"
        [disabled]="saveState() === 'saving'"
        (click)="onSubmit()"
      >
        @if (saveState() === "saving") {
          <span class="spinner"></span>
          {{ "rack_models.saving" | translate }}
        } @else {
          {{ "common.save" | translate }}
        }
      </button>
    </div>
  </div>
</div>
