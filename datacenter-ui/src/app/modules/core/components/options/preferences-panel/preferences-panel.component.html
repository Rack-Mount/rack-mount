<div class="cp-panel">
  <h2 class="cp-title">{{ "settings.preferences_title" | translate }}</h2>
  <div class="pref-row">
    <span class="pref-label">{{ "settings.units_label" | translate }}</span>
    <div class="pref-options">
      <button
        class="pref-btn"
        [class.pref-btn--active]="unitsSetting() === 'auto'"
        (click)="setUnits('auto')"
        [title]="'settings.units_auto_hint' | translate"
      >
        {{ "settings.units_auto" | translate }}
      </button>
      <button
        class="pref-btn"
        [class.pref-btn--active]="unitsSetting() === 'metric'"
        (click)="setUnits('metric')"
      >
        {{ "settings.units_metric" | translate }}
      </button>
      <button
        class="pref-btn"
        [class.pref-btn--active]="unitsSetting() === 'imperial'"
        (click)="setUnits('imperial')"
      >
        {{ "settings.units_imperial" | translate }}
      </button>
    </div>
  </div>
  <p class="pref-preview">
    @if (unitsSetting() === "metric") {
      m, m², kg
    } @else if (unitsSetting() === "imperial") {
      ft, ft², lb
    } @else {
      {{ "settings.units_auto_desc" | translate }}
    }
  </p>
</div>
