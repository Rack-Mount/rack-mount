<div class="toast-container" aria-live="polite" aria-atomic="false">
  @for (t of toast.toasts(); track t.id) {
    <div class="toast toast--{{ t.type }}" role="alert">
      <span class="toast-icon">
        @if (t.type === "error") {
          <svg viewBox="0 0 16 16" fill="none">
            <circle
              cx="8"
              cy="8"
              r="6.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M8 5v3.5M8 10.5v.5"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
        } @else if (t.type === "warning") {
          <svg viewBox="0 0 16 16" fill="none">
            <path
              d="M8 2L14.5 13.5H1.5L8 2Z"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linejoin="round"
            />
            <path
              d="M8 6.5v3M8 11v.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        } @else if (t.type === "success") {
          <svg viewBox="0 0 16 16" fill="none">
            <circle
              cx="8"
              cy="8"
              r="6.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M5 8.5l2 2 4-4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        } @else {
          <svg viewBox="0 0 16 16" fill="none">
            <circle
              cx="8"
              cy="8"
              r="6.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M8 7v5M8 5v.5"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
        }
      </span>
      <span class="toast-message">{{ t.message }}</span>
      <button
        class="toast-dismiss"
        type="button"
        (click)="toast.dismiss(t.id)"
        aria-label="Dismiss"
      >
        <svg viewBox="0 0 12 12" fill="none">
          <path
            d="M2 2l8 8M10 2l-8 8"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>
  }
</div>
