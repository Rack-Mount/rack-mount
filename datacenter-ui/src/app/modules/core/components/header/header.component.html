<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/">
      <img src="logo.svg" alt="Rack Mount" class="navbar-logo" />
    </a>
  </div>

  <div class="navbar-actions">
    <!-- Theme toggle -->
    <button
      class="theme-btn"
      (click)="theme.toggle()"
      [title]="theme.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      [attr.aria-label]="
        theme.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'
      "
    >
      @if (theme.isDark()) {
        <!-- Sun icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
          />
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      }
    </button>

    <!-- Language switcher -->
    <div class="lang-switcher">
      <select
        class="lang-select"
        [value]="lang.currentLang()"
        (change)="lang.use($any($event.target).value)"
        [title]="lang.currentLanguage.label"
      >
        @for (l of lang.availableLanguages; track l.code) {
          <option [value]="l.code" [selected]="lang.currentLang() === l.code">
            {{ l.flag }} {{ l.code.toUpperCase() }}
          </option>
        }
      </select>
    </div>

    <!-- Admin users link (admin role only) -->
    @if (role.canManageUsers()) {
      <button
        class="admin-btn"
        (click)="openAdmin()"
        [title]="'header.manage_users' | translate"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        {{ "header.manage_users" | translate }}
      </button>
    }

    <!-- User info + logout -->
    <div class="user-info">
      <button
        class="change-pwd-btn"
        (click)="openOptions()"
        [title]="'header.options' | translate"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          />
        </svg>
        <span class="user-info__name">{{ auth.username() }}</span>
        @if (role.role(); as r) {
          <span class="user-info__role role-badge--{{ r.name }}">
            {{ "roles." + r.name | translate }}
          </span>
        }
      </button>
      <button
        class="logout-btn"
        (click)="logout()"
        [title]="'header.logout' | translate"
        [attr.aria-label]="'header.logout' | translate"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        {{ "header.logout" | translate }}
      </button>
    </div>
  </div>
</nav>
