<div class="cp-wrap">
  <div class="cp-panel">
    <h2 class="cp-title">{{ "change_password.title" | translate }}</h2>

    @if (saveState() === "success") {
      <div class="cp-success">
        {{ "change_password.success" | translate }}
      </div>
      <button class="btn-secondary" (click)="reset()">
        {{ "change_password.change_again" | translate }}
      </button>
    } @else {
      <div class="edit-panel__fields">
        <div class="edit-field">
          <label class="edit-label">{{
            "change_password.current_password" | translate
          }}</label>
          <input
            class="edit-input"
            type="password"
            [value]="currentPassword()"
            (input)="currentPassword.set($any($event.target).value)"
            [placeholder]="'change_password.current_ph' | translate"
            autocomplete="current-password"
          />
        </div>
        <div class="edit-field">
          <label class="edit-label">{{
            "change_password.new_password" | translate
          }}</label>
          <input
            class="edit-input"
            type="password"
            [value]="newPassword()"
            (input)="newPassword.set($any($event.target).value)"
            [placeholder]="'change_password.new_ph' | translate"
            autocomplete="new-password"
          />
        </div>
        <div class="edit-field">
          <label class="edit-label">{{
            "change_password.confirm_password" | translate
          }}</label>
          <input
            class="edit-input"
            type="password"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            [placeholder]="'change_password.confirm_ph' | translate"
            autocomplete="new-password"
          />
        </div>
      </div>

      @if (saveState() === "error") {
        <p class="cp-error">{{ errorMsg() | translate }}</p>
      }

      <div class="edit-panel__actions">
        <button
          class="btn-save"
          [disabled]="
            saveState() === 'saving' ||
            !currentPassword().trim() ||
            !newPassword().trim() ||
            !confirmPassword().trim()
          "
          (click)="submit()"
        >
          {{
            saveState() === "saving"
              ? ("common.saving" | translate)
              : ("common.save" | translate)
          }}
        </button>
      </div>
    }
  </div>
</div>
