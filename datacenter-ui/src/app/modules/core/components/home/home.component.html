<div class="home">
  <app-home-hero />

  @if (!loading && locations.length > 0) {
    <app-home-stats
      [locationCount]="locations.length"
      [totalRooms]="totalRooms"
    />
  }

  <app-home-locations
    [loading]="loading"
    [locations]="locations"
    [canViewAssets]="role.canViewAssets()"
    [canViewCatalog]="role.canViewCatalog()"
    [canViewInfrastructure]="role.canViewInfrastructure()"
    [canViewRequests]="role.canViewRequests()"
    [isAdmin]="role.isAdmin()"
    [warehouseAlertCount]="warehouseAlerts.count()"
    (roomOpen)="onRoomOpen($event)"
    (assetsOpen)="onAssetsOpen()"
    (modelsOpen)="onModelsOpen()"
    (racksOpen)="onRacksOpen()"
    (warehouseOpen)="onWarehouseOpen()"
    (requestsOpen)="onRequestsOpen()"
    (assetSettingsOpen)="onAssetSettingsOpen()"
  />
</div>
